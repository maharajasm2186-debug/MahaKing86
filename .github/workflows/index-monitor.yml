name: Index Monitor - Stock Index Changes

# Trigger configuration
on:
  # Run every 6 hours (0:00, 6:00, 12:00, 18:00 UTC)
  schedule:
    - cron: '0 0,6,12,18 * * *'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Environment variables
env:
  PYTHON_VERSION: '3.11'
  WORKING_DIR: 'index-monitor'

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    name: Monitor Stock Index Changes
    runs-on: ubuntu-latest

    # Set timeout to 15 minutes
    timeout-minutes: 15
    
    steps:
      # Step 1: Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # Step 2: Set up Python environment
      - name: Set Up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '${{ env.WORKING_DIR }}/requirements.txt'
      
      # Step 3: Install Python dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r ${{ env.WORKING_DIR }}/requirements.txt
      
      # Step 4: Create required directories
      - name: Create Required Directories
        run: |
          mkdir -p ${{ env.WORKING_DIR }}/data
          mkdir -p ${{ env.WORKING_DIR }}/logs
      
      # Step 5: Run Index Monitor
      - name: Run Index Monitor
        env:
          SMTP_SENDER_EMAIL: ${{ secrets.SMTP_SENDER_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          cd ${{ env.WORKING_DIR }}
          python -m src.main
        continue-on-error: true
      
      # Step 6: Check if changes were detected
      - name: Check for Changes
        id: check_changes
        run: |
          if [ -f "${{ env.WORKING_DIR }}/data/changes.db" ]; then
            CHANGE_COUNT=$(sqlite3 ${{ env.WORKING_DIR }}/data/changes.db "SELECT COUNT(*) FROM index_changes WHERE email_sent = 0;" 2>/dev/null || echo "0")
            echo "change_count=$CHANGE_COUNT" >> $GITHUB_OUTPUT
            echo "Changes detected: $CHANGE_COUNT"
          else
            echo "change_count=0" >> $GITHUB_OUTPUT
            echo "No database found yet"
          fi
      
      # Step 7: Commit changes to repository
      - name: Commit Changes to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add all changes
          git add -A
          
          # Check if there are changes to commit
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Index Monitor Update - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
              -m "Detected ${{ steps.check_changes.outputs.change_count }} new index changes" \
              -m "Automated commit by GitHub Actions"
            git push
            echo "✓ Changes committed and pushed"
          fi
        continue-on-error: true
      
      # Step 8: Upload logs as artifact
      - name: Upload Logs as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: index-monitor-logs-${{ github.run_id }}
          path: ${{ env.WORKING_DIR }}/logs/
          retention-days: 7
          if-no-files-found: ignore
      
      # Step 9: Upload database as artifact
      - name: Upload Database as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: index-monitor-database-${{ github.run_id }}
          path: ${{ env.WORKING_DIR }}/data/changes.db
          retention-days: 30
          if-no-files-found: ignore
      
      # Step 10: Create GitHub Issue on failure
      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Index Monitor Failed - Run #${{ github.run_id }}`,
              body: `
            The Index Monitor workflow failed during execution.
            
            **Run Details:**
            - Run ID: ${{ github.run_id }}
            - Trigger: ${{ github.event_name }}
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            
            **View Full Logs:**
            [GitHub Actions Run](${runUrl})
            
            **Artifacts:**
            - Logs: Check the artifacts section for detailed logs
            - Database: Latest database snapshot (if available)
            
            **Troubleshooting:**
            1. Check the workflow logs for error messages
            2. Verify GitHub Secrets are configured correctly
            3. Ensure SMTP credentials are valid
            4. Check press release feeds are accessible
            
            **Next Steps:**
            - Review logs in the Actions tab
            - Fix any configuration issues
            - Manually trigger workflow or wait for next scheduled run
              `,
              labels: ['bug', 'index-monitor', 'automated']
            });
            console.log(`Created issue #${issue.data.number}`);
      
      # Step 11: Create GitHub Issue on success with changes
      - name: Create Issue on Success with Changes
        if: success() && steps.check_changes.outputs.change_count > 0
        uses: actions/github-script@v6
        with:
          script: |
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `✅ Index Changes Detected - ${{ steps.check_changes.outputs.change_count }} Changes`,
              body: `
            The Index Monitor detected **${{ steps.check_changes.outputs.change_count }}** new index constituent changes.
            
            **Run Details:**
            - Run ID: ${{ github.run_id }}
            - Execution Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            - Changes Detected: ${{ steps.check_changes.outputs.change_count }}
            
            **Email Notification:**
            An email notification has been sent to maharajasm2186@gmail.com with details about:
            - Companies added to indices
            - Companies removed from indices
            - CIK codes and GICS industry classification
            
            **View Details:**
            [GitHub Actions Run](${runUrl})
            
            **Database Updates:**
            - Changes have been recorded in the SQLite database
            - Audit trail is available in the repository
              `,
              labels: ['index-monitor', 'changes-detected', 'automated']
            });
            console.log(`Created issue #${issue.data.number}`);
      
      # Step 12: Print summary
      - name: Print Execution Summary
        if: always()
        run: |
          echo "=========================================="
          echo "Index Monitor Execution Summary"
          echo "=========================================="
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Status: ${{ job.status }}"
          echo "Changes Detected: ${{ steps.check_changes.outputs.change_count }}"
          echo "Execution Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="
