name: Index Monitor - Stock Index Changes

# Trigger configuration
on:
  # Run every 6 hours (0:00, 6:00, 12:00, 18:00 UTC)
  schedule:
    - cron: '0 0,6,12,18 * * *'

  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Environment variables
env:
  PYTHON_VERSION: '3.11'

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    name: Monitor Stock Index Changes
    runs-on: ubuntu-latest

    # Set timeout to 15 minutes
    timeout-minutes: 15

    steps:
      # Step 1: Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Step 2: Set up Python environment
      - name: Set Up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      # Step 3: Install Python dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      # Step 4: Run Index Monitor (single combined script -- covers S&P
      # 100/500/400/600, Dow, Nasdaq-100, and Russell 3000/2000/1000, writes
      # the CSV + Excel report, and emails the going-forward results from
      # maggy2186@gmail.com to maharajasm2186@gmail.com using the
      # SMTP_SENDER_EMAIL / SMTP_PASSWORD repo secrets below)
      - name: Run Index Monitor
        env:
          SMTP_SENDER_EMAIL: ${{ secrets.SMTP_SENDER_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python index_monitor_combined.py
        continue-on-error: true

      # Step 5: Check if going-forward changes were found this run
      - name: Check for Changes
        id: check_changes
        run: |
          if [ -f "index_changes_going_forward.csv" ]; then
            CHANGE_COUNT=$(( $(wc -l < index_changes_going_forward.csv) - 1 ))
            if [ "$CHANGE_COUNT" -lt 0 ]; then CHANGE_COUNT=0; fi
            echo "change_count=$CHANGE_COUNT" >> $GITHUB_OUTPUT
            echo "Going-forward changes detected: $CHANGE_COUNT"
          else
            echo "change_count=0" >> $GITHUB_OUTPUT
            echo "No CSV output found -- run may have failed before writing results"
          fi

      # Step 6: Commit the generated CSV/Excel results to the repository
      # (keeps a running audit trail of every run's going-forward results)
      - name: Commit Changes to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add all changes
          git add -A

          # Check if there are changes to commit
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Index Monitor Update - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
              -m "Detected ${{ steps.check_changes.outputs.change_count }} going-forward index changes" \
              -m "Automated commit by GitHub Actions"
            git push
            echo "✓ Changes committed and pushed"
          fi
        continue-on-error: true

      # Step 7: Upload the CSV + Excel report as a workflow artifact
      - name: Upload Results as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: index-monitor-results-${{ github.run_id }}
          path: |
            index_changes_going_forward.csv
            index_changes_going_forward.xlsx
          retention-days: 30
          if-no-files-found: ignore

      # Step 8: Create GitHub Issue on failure
      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Index Monitor Failed - Run #${{ github.run_id }}`,
              body: `
            The Index Monitor workflow failed during execution.

            **Run Details:**
            - Run ID: ${{ github.run_id }}
            - Trigger: ${{ github.event_name }}
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}

            **View Full Logs:**
            [GitHub Actions Run](${runUrl})

            **Artifacts:**
            - Results: Check the artifacts section for the CSV/Excel output (if it got that far)

            **Troubleshooting:**
            1. Check the workflow logs for error messages
            2. Verify GitHub Secrets are configured correctly (SMTP_SENDER_EMAIL, SMTP_PASSWORD)
            3. Ensure the SMTP_PASSWORD secret is a Gmail App Password, not the account password
            4. Check press release feeds (spglobal.com/prnewswire.com, nasdaq.com, lseg.com) are accessible

            **Next Steps:**
            - Review logs in the Actions tab
            - Fix any configuration issues
            - Manually trigger workflow or wait for next scheduled run
              `,
              labels: ['bug', 'index-monitor', 'automated']
            });
            console.log(`Created issue #${issue.data.number}`);

      # Step 9: Create GitHub Issue on success with changes
      - name: Create Issue on Success with Changes
        if: success() && steps.check_changes.outputs.change_count > 0
        uses: actions/github-script@v6
        with:
          script: |
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `✅ Index Changes Detected - ${{ steps.check_changes.outputs.change_count }} Changes`,
              body: `
            The Index Monitor detected **${{ steps.check_changes.outputs.change_count }}** going-forward index constituent changes.

            **Run Details:**
            - Run ID: ${{ github.run_id }}
            - Execution Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            - Changes Detected: ${{ steps.check_changes.outputs.change_count }}

            **Email Notification:**
            An email notification has been sent from maggy2186@gmail.com to maharajasm2186@gmail.com
            with the CSV and Excel report attached (Side by side, and Add/Remove version with latest
            SEC filing detail for every company, added and removed).

            **View Details:**
            [GitHub Actions Run](${runUrl})

            **Repository Updates:**
            - index_changes_going_forward.csv and .xlsx have been committed to the repository
            - Audit trail is available in the repository history
              `,
              labels: ['index-monitor', 'changes-detected', 'automated']
            });
            console.log(`Created issue #${issue.data.number}`);

      # Step 10: Print summary
      - name: Print Execution Summary
        if: always()
        run: |
          echo "=========================================="
          echo "Index Monitor Execution Summary"
          echo "=========================================="
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Status: ${{ job.status }}"
          echo "Changes Detected: ${{ steps.check_changes.outputs.change_count }}"
          echo "Execution Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="
